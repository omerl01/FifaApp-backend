name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: fifaapp-backend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -v

  build-push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}
      image_tag: ${{ steps.set-tag.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compute short SHA tag
        id: set-tag
        run: |
          echo "tag=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.set-tag.outputs.tag }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  update-manifest:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Check out FifaApp-infra repository
        uses: actions/checkout@v4
        with:
          repository: omerl01/FifaApp-infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: FifaApp-infra

      - name: Update image tag in deployment.yaml
        run: |
          sed -i "s|image:.*fifaapp-backend:.*|image: ${{ needs.build-push.outputs.ecr_registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.build-push.outputs.image_tag }}|g" FifaApp-infra/k8s/backend/deployment.yaml

      - name: Commit and push manifest update
        run: |
          cd FifaApp-infra
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/backend/deployment.yaml
          git commit -m "Deploy backend image: ${{ needs.build-push.outputs.image_tag }}"
          git pull --rebase origin main
          git push origin main
